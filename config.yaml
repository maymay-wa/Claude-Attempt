# Configuration for protein-DNA binding affinity prediction.
# Swap components by changing the `name` fields below (see encoders.py registries).

# --- data files ---
dbp_path: training_DBPs_small.txt
seq_path: training_seqs_small.txt
data_path: training_data_small.txt

# --- protein encoder (precomputed cache built by embed_proteins.py) ---
# To swap the protein encoder: build a different cache and point here.
#   esm2_t30_150M_UR50D.pt (640-d) | esm2_t33_650M_UR50D.pt (1280-d) | kmer3.pt (8000-d baseline)
esm_cache: cache/esm2_t33_650M_UR50D.pt

# --- target transform (see explore_data.py for the rationale) ---
target:
  mode: per_protein     # per_protein (recommended; ~94x scale spread across proteins) | global
  log1p: false          # true compresses the right skew (skew 0.62 -> ~0)
  clip_quantile: 0.001  # per-side tail fraction: winsorize to [0.001, 0.999] train quantiles; null to disable

# --- model components (each `name` indexes a registry in encoders.py) ---
dna_encoder:
  name: cnn_deep  # cnn | cnn_attn | cnn_deep | rnn
  channels: 256
  out_dim: 256
  dropout: 0.2
  attn_heads: 4         # cnn_attn/cnn_deep: # of attentive-pool heads

protein_encoder:
  name: mlp_res         # mlp | mlp_res | linear | identity
  out_dim: 256
  hidden: 768
  dropout: 0.3

interaction:
  name: concat_hadamard # concat_hadamard | concat | bilinear
  emb_dim: 256
  hidden: 384
  dropout: 0.3

# --- training ---
# Two-tower outer-product training: each step encodes `probe_block` unique probes
# once and ALL train proteins once, then scores the full grid through the cheap
# interaction head (no redundant convolutions). One step covers probe_block x
# n_train_proteins pairs. batch_size is unused by the blocked trainer.
probe_block: 512
batch_size: 2048       # (legacy; unused by blocked trainer)
epochs: 100
lr: 0.0015
weight_decay: 0.0001
scheduler: cosine      # cosine (linear warmup -> cosine decay) | plateau
warmup_epochs: 5
min_lr_frac: 0.02      # cosine LR floor as a fraction of peak lr
rc_prob: 0.5           # probability of reverse-complement augmentation per sample
tta_rc: true           # eval-time: average prediction over probe + its reverse-complement
early_stop_patience: 20

# --- cross-validation ---
n_splits: 5            # leave-proteins-out GroupKFold (50 proteins -> 10 held out/fold)
seed: 0
